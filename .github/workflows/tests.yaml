name: Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout repository code # checkout
              uses: actions/checkout@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json
            - name: Node setup
              uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Install
              run: npm ci
            - name: Generate prisma client (since CI doesn't have it)
              run: npx prisma generate
            - name: Linter
              run: npm run lint
            - name: Test
              run: npm run test
